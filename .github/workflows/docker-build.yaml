name: "Build Devcontainer Docker Images"

on:
  workflow_dispatch

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: cpp-debian
            os: ubuntu-latest
            context: src/cpp/.devcontainer
            dockerfile: debian.Dockerfile
          - name: cpp-archlinux
            os: ubuntu-latest
            context: src/cpp/.devcontainer
            dockerfile: archlinux.Dockerfile
          - name: msvc
            os: windows-latest
            context: src/msvc/.devcontainer
            dockerfile: Dockerfile
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: docker/build-push-action@v7
        with:
          builder: default
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          pull: true
          push: false
          tags: ${{ matrix.name }}:latest
